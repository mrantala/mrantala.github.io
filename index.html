<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weight Tracker</title>
 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script> 

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0077cc">
</head>

<body>
  <nav id="nav" aria-label="Primary">
    <button data-view="entry" aria-label="Data Entry">
      📄
    </button>
    <button data-view="charts" aria-label="Charts">
      📈
    </button>
    <button data-view="settings" aria-label="Settings">
      ⚙️
    </button>
    <button data-view="info" aria-label="Info">
      ℹ️
    </button>
  </nav>

  <main>
    <!-- Data Entry View -->
	<section id="view-entry" class="view">
	  <h1>Data Entry</h1>

	  <form id="entry-form" novalidate>
		<div class="form-group">
		  <label for="entry-date">Date</label>
		  <input type="date" id="entry-date" required />
		</div>

		<div class="form-group">
		  <label for="entry-weight">Weight</label>
		  <input type="number" id="entry-weight" step="0.1" required />
		  <small id="unit-label" class="hint">lb</small>
		</div>
		
		<div class="form-group">
			<label>
			  <input type="checkbox" id="entry-primary" checked>
			  Morning weight
			</label>
		</div>

		<div class="form-group">
		  <label for="entry-comments">Comments</label>
		  <textarea id="entry-comments" rows="3"></textarea>
		</div>

		<div id="edit-indicator" class="hidden edit-banner">
		  Editing existing entry
		</div>

		<div class="form-actions">
		  <button type="submit" id="save-btn">Save</button>
		  <button type="button" id="cancel-edit-btn" class="hidden">Cancel</button>
		</div>
	  </form>

	  <h2>Entries</h2>
	  <ul id="entry-list"></ul>
	</section>

	<!-- Charts View -->
	<section id="view-charts" class="view hidden">
	  <h1>Charts</h1>

	  <!-- Chart Type Selector -->
	  <div class="form-group">
		<label for="chart-type">Chart Type</label>
		<select id="chart-type">
		  <option value="daily">Daily Weight</option>
		  <option value="weeklyMedian">Weekly Median Weight</option>
		</select>
	  </div>

	  <!-- Daily Controls -->
	  <div id="daily-controls" class="chart-controls">
		<label>Date Range</label>
		<div class="button-group">
		  <button data-range="7">7d</button>
		  <button data-range="14">14d</button>
		  <button data-range="30">30d</button>
		  <button data-range="90">90d</button>
		  <button data-range="180">180d</button>
		  <button data-range="365">365d</button>
		  <button data-range="custom">Custom</button>
		</div>

		<div id="daily-custom-range" class="hidden">
		  <label>Custom Start</label>
		  <input type="date" id="daily-start">
		  <label>Custom End</label>
		  <input type="date" id="daily-end">
		</div>
	  </div>

	  <!-- Weekly Controls -->
	  <div id="weekly-controls" class="chart-controls hidden">
		<label>Weeks</label>
		<div class="button-group">
		  <button data-weeks="4">4w</button>
		  <button data-weeks="12">12w</button>
		  <button data-weeks="26">26w</button>
		  <button data-weeks="52">52w</button>
		</div>
	  </div>

	  <!-- Shared Toggles -->
	  <div class="form-group">
		<label>
		  <input type="checkbox" id="primary-only" checked>
		  Primary entries only
		</label>
	  </div>

	  <div class="form-group">
		<label>
		  <input type="checkbox" id="include-regression">
		  Include trendline
		</label>
	  </div>

	  <!-- Chart Canvas -->
	  <canvas id="weight-chart"></canvas>
	</section>


    <!-- Settings View -->
	<section id="view-settings" class="view hidden">
	  <h1>Settings</h1>

	  <form id="settings-form" novalidate>
		<div class="form-group">
		  <label>Units</label>
		  <div class="radio-group">
			<label>
			  <input type="radio" name="units" value="lb" required />
			  Pounds (lb)
			</label>
			<label>
			  <input type="radio" name="units" value="kg" />
			  Kilograms (kg)
			</label>
		  </div>
		</div>

		<div class="form-group">
		  <label for="goal-weight">Goal Weight (optional)</label>
		  <input type="number" id="goal-weight" step="0.1" />
		</div>

		<div class="form-actions">
		  <button type="submit">Save Settings</button>
		</div>
	  </form>

	  <h2>Data Tools</h2>
	  <div class="form-actions">
		<button id="export-btn">Export Data (CSV)</button>
		<button id="import-btn">Import Data (CSV)</button>
		<input type="file" id="import-file" accept=".csv" class="hidden" />
	  </div>
	</section>

    <!-- Info View -->
    <section id="view-info" class="view hidden">
      <h1>Info</h1>
      <p>About this app.</p>
	  <p id="app-version">v0.0.32</p>
    </section>
  </main>

  <!-- <script src="/libs/chart.umd.js"></script> -->
<!-- <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> -->
<!-- <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script> -->

<script type="module" src="js/main.js"></script>


</body>

</html>
